name: Percy Visual Tests

on:
    pull_request:
    push:
        branches:
            - master

jobs:
    percy-visual:
        runs-on: ubuntu-latest
        timeout-minutes: 30
        env:
            NEXT_TELEMETRY_DISABLED: "1"
            PERCY_TOKEN: ${{ secrets.PERCY_TOKEN }}
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup pnpm
              uses: pnpm/action-setup@v4
              with:
                  version: 10

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: pnpm

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Install Playwright Chromium
              run: pnpm exec playwright install --with-deps chromium

            - name: Validate visual API configuration
              env:
                  VISUAL_API_BASE_URL: ${{ vars.VISUAL_API_BASE_URL }}
              run: |
                  if [ -z "$VISUAL_API_BASE_URL" ]; then
                    echo "VISUAL_API_BASE_URL repository variable is required for Percy visual tests."
                    exit 1
                  fi

            - name: Run Percy visual tests
              if: ${{ env.PERCY_TOKEN != '' }}
              env:
                  NEXT_PUBLIC_API_BASE_URL: ${{ vars.VISUAL_API_BASE_URL }}
                  E2E_API_BASE_URL: ${{ vars.VISUAL_API_BASE_URL }}
              run: pnpm test:visual:percy

            - name: Run visual tests without Percy
              if: ${{ env.PERCY_TOKEN == '' }}
              env:
                  NEXT_PUBLIC_API_BASE_URL: ${{ vars.VISUAL_API_BASE_URL }}
                  E2E_API_BASE_URL: ${{ vars.VISUAL_API_BASE_URL }}
              run: pnpm test:visual

            - name: Upload Playwright artifacts
              if: always()
              uses: actions/upload-artifact@v4
              with:
                  name: playwright-visual-artifacts
                  path: |
                      test-results
                      playwright-report
